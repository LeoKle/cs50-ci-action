name: Publish Docker Image
on:
  release:
    types: [published]

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/leokle/cs50-ci-action:latest
            ghcr.io/leokle/cs50-ci-action:sha-${{ github.sha }}
            ghcr.io/leokle/cs50-ci-action:${{ github.event.release.tag_name }}